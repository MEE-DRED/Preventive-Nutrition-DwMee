<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍲 Dine With Mee - Integration Test Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0d3d26 0%, #1a5c3a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .emoji {
            font-size: 1.2em;
        }
        
        p {
            color: #c8a84b;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .test-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(200, 168, 75, 0.3);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .test-card:hover {
            border-color: #c8a84b;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .test-card h3 {
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .test-list {
            list-style: none;
        }
        
        .test-list li {
            padding: 8px 0;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-badge {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 0.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .status-pass {
            background: #4ade80;
            color: #000;
        }
        
        .status-fail {
            background: #f87171;
            color: #fff;
        }
        
        .status-pending {
            background: #fbbf24;
            color: #000;
        }
        
        .summary {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #c8a84b;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            text-align: center;
        }
        
        .summary-item {
            padding: 20px;
        }
        
        .summary-item .number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .summary-item .label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        button {
            background: #c8a84b;
            color: #0d3d26;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        
        button:hover {
            background: #e0c268;
            transform: translateY(-2px);
        }
        
        .log-output {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(200, 168, 75, 0.3);
            border-radius: 8px;
            padding: 20px;
            font-family: "Courier New", monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 40px;
        }
        
        .log-line {
            padding: 4px 0;
            line-height: 1.5;
        }
        
        .log-pass {
            color: #4ade80;
        }
        
        .log-fail {
            color: #f87171;
        }
        
        .log-warn {
            color: #fbbf24;
        }
        
        .log-info {
            color: #93c5fd;
        }
        
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding-top: 40px;
            border-top: 1px solid rgba(200, 168, 75, 0.2);
        }
        
        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        a {
            color: #c8a84b;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        a:hover {
            color: #e0c268;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="emoji">🍲</span>
                Dine With Mee - Integration Test Dashboard
            </h1>
            <p>Comprehensive frontend integration validation</p>
        </header>
        
        <div class="summary" id="summary">
            <div class="summary-item">
                <div class="number" id="passCount">0</div>
                <div class="label">Tests Passed</div>
            </div>
            <div class="summary-item">
                <div class="number" id="failCount">0</div>
                <div class="label">Tests Failed</div>
            </div>
            <div class="summary-item">
                <div class="number" id="pendingCount">0</div>
                <div class="label">Tests Pending</div>
            </div>
            <div class="summary-item">
                <div class="number" id="successRate">0%</div>
                <div class="label">Success Rate</div>
            </div>
        </div>
        
        <div class="actions">
            <button onclick="runAllTests()">▶️ Run All Tests</button>
            <button onclick="runPageSpecificTests()">📄 Test Current Page</button>
            <button onclick="runAPITests()">🔌 Test Backend</button>
            <button onclick="downloadLogs()">⬇️ Download Reports</button>
            <button onclick="clearLogs()">🗑️ Clear Logs</button>
        </div>
        
        <div class="log-output" id="logOutput">
            <div class="log-line log-info">Waiting for tests to run... Click a button above to start.</div>
        </div>
        
        <div class="test-grid" id="testGrid"></div>
        
        <div class="footer">
            <p>Integration Testing Guide: <a href="/INTEGRATION_TESTING_GUIDE.md" target="_blank">View Full Guide</a></p>
            <div class="links">
                <a href="http://localhost:3000/index-new.html">🏠 Home</a>
                <a href="http://localhost:3000/login.html">🔐 Login</a>
                <a href="http://localhost:3000/signup.html">📝 Sign Up</a>
                <a href="http://localhost:3000/marketplace.html">🛒 Marketplace</a>
            </div>
        </div>
    </div>

    <script>
        let testResults = {
            passed: [],
            failed: [],
            pending: [],
            all: []
        };
        
        const log = {
            outputEl: document.getElementById('logOutput'),
            lines: [],
            
            add(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const line = `[${timestamp}] ${message}`;
                this.lines.push({ message: line, type });
                this.render();
            },
            
            pass(msg) { this.add(`✅ ${msg}`, 'pass'); },
            fail(msg) { this.add(`❌ ${msg}`, 'fail'); },
            warn(msg) { this.add(`⚠️  ${msg}`, 'warn'); },
            info(msg) { this.add(`ℹ️  ${msg}`, 'info'); },
            
            render() {
                this.outputEl.innerHTML = this.lines
                    .map(l => `<div class="log-line log-${l.type}">${l.message}</div>`)
                    .join('');
                this.outputEl.scrollTop = this.outputEl.scrollHeight;
            },
            
            clear() {
                this.lines = [];
                this.render();
            }
        };
        
        function updateSummary() {
            const passed = testResults.passed.length;
            const failed = testResults.failed.length;
            const pending = testResults.pending.length;
            const total = passed + failed + pending;
            const successRate = total > 0 ? Math.round((passed / total) * 100) : 0;
            
            document.getElementById('passCount').textContent = passed;
            document.getElementById('failCount').textContent = failed;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('successRate').textContent = successRate + '%';
        }
        
        async function runAllTests() {
            log.clear();
            testResults = { passed: [], failed: [], pending: [], all: [] };
            
            log.info('Starting comprehensive integration tests...');
            log.info(`Current page: ${window.location.pathname}`);
            
            await runPageSpecificTests();
            await runAPITests();
            await runDOMTests();
            
            log.info('All tests completed!');
            updateSummary();
        }
        
        async function runPageSpecificTests() {
            log.info('Testing page-specific integration...');
            
            const path = window.location.pathname;
            
            // Guard flags
            if (path.includes('index') || path === '/' || path === '') {
                if (window.__DWM_INTEGRATION_HOME__) {
                    testResults.passed.push('Home guard flag set');
                    log.pass('Home guard flag set');
                } else {
                    testResults.failed.push('Home guard flag NOT set');
                    log.fail('Home guard flag NOT set');
                }
            }
            
            if (path.includes('marketplace')) {
                if (window.__DWM_INTEGRATION_MARKETPLACE__) {
                    testResults.passed.push('Marketplace guard flag set');
                    log.pass('Marketplace guard flag set');
                } else {
                    testResults.failed.push('Marketplace guard flag NOT set');
                    log.fail('Marketplace guard flag NOT set');
                }
            }
            
            if (path.includes('login') || path.includes('signup')) {
                if (window.__DWM_INTEGRATION_AUTH__) {
                    testResults.passed.push('Auth guard flag set');
                    log.pass('Auth guard flag set');
                } else {
                    testResults.failed.push('Auth guard flag NOT set');
                    log.fail('Auth guard flag NOT set');
                }
            }
            
            updateSummary();
        }
        
        async function runAPITests() {
            log.info('Testing backend API connectivity...');
            
            try {
                const response = await fetch('http://localhost:5000/api/health', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    testResults.passed.push('Backend health check passed');
                    log.pass(`Backend responding: ${data.message}`);
                } else {
                    testResults.failed.push(`Backend returned status ${response.status}`);
                    log.fail(`Backend returned status ${response.status}`);
                }
            } catch (error) {
                testResults.pending.push('Backend not available (database not configured)');
                log.warn(`Backend not available: ${error.message}`);
                log.info('This is expected if PostgreSQL is not set up. See guide for options.');
            }
            
            updateSummary();
        }
        
        async function runDOMTests() {
            log.info('Testing DOM integration...');
            
            // Common elements
            const nav = document.querySelector('nav');
            if (nav) {
                testResults.passed.push('Navigation found');
                log.pass('Navigation found');
            } else {
                testResults.failed.push('Navigation not found');
                log.fail('Navigation not found');
            }
            
            // Storage
            try {
                localStorage.setItem('__test__', '1');
                localStorage.removeItem('__test__');
                testResults.passed.push('localStorage working');
                log.pass('localStorage working');
            } catch (e) {
                testResults.failed.push('localStorage not available');
                log.fail('localStorage not available');
            }
            
            // Stylesheets
            const styles = document.querySelectorAll('link[rel="stylesheet"]');
            if (styles.length > 0) {
                testResults.passed.push(`Found ${styles.length} stylesheets`);
                log.pass(`Found ${styles.length} stylesheets`);
            } else {
                testResults.failed.push('No stylesheets found');
                log.fail('No stylesheets found');
            }
            
            updateSummary();
        }
        
        function downloadLogs() {
            const content = log.lines.map(l => l.message).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `integration-test-${new Date().toISOString().slice(0, 10)}.log`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function clearLogs() {
            log.clear();
            testResults = { passed: [], failed: [], pending: [], all: [] };
            updateSummary();
        }
        
        // Run tests on page load
        window.addEventListener('load', () => {
            log.info('Test dashboard loaded');
            log.info('Select a test option to begin');
        });
    </script>
</body>
</html>
